services:
  # ===== HDFS =====
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    environment:
      - CLUSTER_NAME=basePipeline-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "127.0.0.1:9870:9870"   # HDFS NameNode UI
      - "127.0.0.1:9000:9000"   # HDFS RPC (only needed if connecting from host)
    volumes:
      - namenode_data:/hadoop/dfs/name
    mem_limit: 896m       # NN JVM heap + metadata index + headroom
    memswap_limit: 896m   # disable swap — OOM is preferable to swap thrash
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    mem_limit: 768m       # block transfer buffers + JVM GC headroom
    memswap_limit: 768m
    restart: unless-stopped

  # ===== Kafka (KRaft mode, no ZooKeeper) =====
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    user: "root"  # workaround for log-dir permission issues
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - CLUSTER_ID=${KAFKA_CLUSTER_ID}
      # Heap: 512m lets the broker handle 11 topics × 3 partitions + metadata comfortably.
      # The remaining ~512m in the 1g container serves OS page cache (Kafka's hot path).
      - KAFKA_JVM_PERFORMANCE_OPTS=-Xmx512m -Xms256m
    ports:
      - "127.0.0.1:9092:9092"   # Kafka broker — producers must run on the same host, or use SSH tunnel
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cd /opt/kafka/bin && ./kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== Spark =====
  spark-master:
    image: apache/spark:3.5.1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:7077:7077"   # Spark master RPC
      - "127.0.0.1:8080:8080"   # Spark master UI
    volumes:
      - ./processing:/opt/spark/work-dir
    # master daemon (~210m) + driver process (256m heap + ~30m overhead) + headroom
    mem_limit: 1200m
    memswap_limit: 1200m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker:
    image: apache/spark:3.5.1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./processing:/opt/spark/work-dir
    # Memory budget for the heaviest job (Gold):
    #   executor heap   : 1024m  (MEM_GOLD)
    #   executor overhead:  768m  (spark.executor.memoryOverhead — explicit in Makefile)
    #   worker daemon   :  ~256m
    #   buffer          :  ~952m
    #   ─────────────────────────
    #   total           :  3g
    # Bronze/Silver (512m executor + 512m overhead + 256m daemon) fit well within this.
    mem_limit: 3g
    memswap_limit: 3g
    restart: unless-stopped

  # ===== PostgreSQL (Airflow + MLflow metadata DB) =====
  postgres:
    image: postgres:13-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"   # Postgres — host 5433 (5432 collides with a locally-installed Postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 384m       # Airflow metadata + MLflow metadata
    memswap_limit: 384m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create mlflow_db in the shared postgres instance.
  postgres-init:
    image: postgres:13-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=${POSTGRES_USER}
      - PGDATABASE=${POSTGRES_DB}
    entrypoint:
      - sh
      - -c
      - |
        psql -h postgres -tc "SELECT 1 FROM pg_database WHERE datname='mlflow_db'" | grep -q 1 \
        || psql -h postgres -c 'CREATE DATABASE mlflow_db'
        echo '[postgres-init] mlflow_db ready.'
    restart: "no"

  # ===== MinIO (S3-compatible artifact storage for MLflow) =====
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9100:9000"   # MinIO S3 API (9000 conflicts with HDFS namenode on host)
      - "127.0.0.1:9101:9001"   # MinIO Web console
    volumes:
      - minio_data:/data
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # One-shot: create the "mlflow" bucket inside MinIO.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
          echo '[minio-init] waiting for MinIO...' && sleep 2;
        done;
        mc mb --ignore-existing local/mlflow;
        echo '[minio-init] mlflow bucket ready.'
      "
    restart: "no"

  # ===== MLflow (experiment tracking + model registry) =====
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    command:
      - bash
      - -c
      - |
          pip install --quiet psycopg2-binary boto3 >/dev/null 2>&1 &&
          exec mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri "postgresql+psycopg2://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/mlflow_db" \
            --default-artifact-root s3://mlflow/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    ports:
      - "127.0.0.1:5000:5000"   # MLflow UI + API
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()\" || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10

  # ===== FastAPI (AttentionLSTM training + inference) =====
  fastapi:
    build: ./ml_module
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - HDFS_SILVER_BASE=hdfs://namenode:9000/data/silver/wearable
      - HDFS_GOLD_BASE=hdfs://namenode:9000/data/gold/wearable
      - EPOCHS=15
    ports:
      - "127.0.0.1:8000:8000"   # FastAPI — /train, /predict, /health
    depends_on:
      mlflow:
        condition: service_healthy
      namenode:
        condition: service_healthy
    mem_limit: 3g              # PyTorch + PySpark local driver + data in memory
    memswap_limit: 3g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== Airflow (webserver + scheduler, LocalExecutor) =====
  airflow:
    image: apache/airflow:2.7.1-python3.10
    # Run as root so the container can access the mounted Docker socket.
    # The DAG uses BashOperator + `docker exec` to run spark-submit against
    # the spark-master container (same pattern as the Makefile).
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK=True
      - _AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}
      - _AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
      - _AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}
      - _AIRFLOW_ADMIN_FIRSTNAME=${AIRFLOW_ADMIN_FIRSTNAME}
      - _AIRFLOW_ADMIN_LASTNAME=${AIRFLOW_ADMIN_LASTNAME}
    command:
      - bash
      - -c
      - |
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq docker.io >/dev/null
          fi
          airflow db migrate
          airflow users create \
            --username "$$_AIRFLOW_ADMIN_USER" \
            --password "$$_AIRFLOW_ADMIN_PASSWORD" \
            --firstname "$$_AIRFLOW_ADMIN_FIRSTNAME" \
            --lastname "$$_AIRFLOW_ADMIN_LASTNAME" \
            --role Admin \
            --email "$$_AIRFLOW_ADMIN_EMAIL" || true
          airflow scheduler &
          exec airflow webserver
    ports:
      - "127.0.0.1:8081:8080"   # Airflow UI
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock    # required for `docker exec` from DAG tasks
    depends_on:
      postgres:
        condition: service_healthy
    # 2g covers: webserver (~512m) + scheduler (~512m) + LocalExecutor task processes (~512m) + headroom
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()\""]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  namenode_data:
  datanode_data:
  postgres_data:
  kafka_data:
  minio_data:
